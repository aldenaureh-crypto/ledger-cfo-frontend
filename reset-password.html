<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Ledger CFO</title>
  <meta name="description" content="Set a new password for your Ledger CFO account."/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0f2d6b;--navy-light:#1a3f8f;--navy-pale:#eaeffa;
      --charcoal:#0d1117;--gray:#5a6a7e;--gray-light:#9aaabb;
      --border:#dde3ee;--cream:#f6f8fc;--white:#fff;
      --red:#c0392b;--green:#1a6e4a;
      --shadow-md:0 4px 24px rgba(13,17,23,0.1);
    }
    body{font-family:'Epilogue',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:var(--white);border-bottom:1px solid var(--border)}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--charcoal);letter-spacing:-0.3px;line-height:1}
    .nav-logo-tag{font-size:9px;font-weight:500;color:var(--navy);letter-spacing:3.5px;line-height:1}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
    .card{background:var(--white);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-md);width:100%;max-width:420px;padding:48px;animation:fadeUp 0.6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--navy);margin-bottom:12px}
    .card-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--charcoal);letter-spacing:-0.5px;line-height:1.1;margin-bottom:8px}
    .card-sub{font-size:14px;font-weight:300;color:var(--gray);margin-bottom:32px;line-height:1.6}
    .form-group{margin-bottom:20px}
    .form-label{display:block;font-size:13px;font-weight:500;color:var(--charcoal);margin-bottom:6px}
    .form-input{width:100%;font-family:'Epilogue',sans-serif;font-size:14px;font-weight:300;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;outline:none;background:var(--cream);color:var(--charcoal);transition:border-color 0.2s}
    .form-input:focus{border-color:var(--navy);background:var(--white)}
    .submit-btn{width:100%;font-family:'Epilogue',sans-serif;font-size:15px;font-weight:600;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:10px;cursor:pointer;transition:background 0.2s;box-shadow:0 4px 16px rgba(15,45,107,0.25)}
    .submit-btn:hover{background:var(--navy-light)}
    .submit-btn:disabled{background:var(--border);color:var(--gray-light);cursor:not-allowed}
    .error-banner{background:#fdecea;border:1px solid rgba(192,57,43,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:20px;display:none}
    .error-banner.show{display:block}
    .success-banner{background:#e8f5ef;border:1px solid rgba(26,110,74,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--green);margin-bottom:20px;display:none}
    .success-banner.show{display:block}
    footer{padding:24px;text-align:center;font-size:13px;color:var(--gray-light);border-top:1px solid var(--border);background:var(--white)}

    @media(max-width:500px){
      nav{padding:0 20px}
      .main{padding:24px 16px}
      .card{padding:32px 24px}
      .card-title{font-size:26px}
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <svg width="32" height="32" viewBox="0 0 52 52" fill="none">
      <rect width="52" height="52" rx="11" fill="#0f2d6b"/>
      <rect x="10" y="30" width="8" height="14" rx="2" fill="white" opacity="0.45"/>
      <rect x="22" y="20" width="8" height="24" rx="2" fill="white" opacity="0.7"/>
      <rect x="34" y="12" width="8" height="32" rx="2" fill="white"/>
      <polyline points="10,26 26,16 44,8" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      <circle cx="10" cy="26" r="2.2" fill="white" opacity="0.85"/>
      <circle cx="26" cy="16" r="2.2" fill="white" opacity="0.85"/>
      <circle cx="44" cy="8" r="2.2" fill="white" opacity="0.85"/>
    </svg>
    <div style="display:flex;flex-direction:column;gap:1px">
      <span class="nav-logo-name">Ledger</span>
      <span class="nav-logo-tag">CFO</span>
    </div>
  </a>
</nav>

<div class="main">
  <div class="card">
    <p class="card-label">Security</p>
    <h1 class="card-title">Set new password.</h1>
    <p class="card-sub">Choose a strong password for your Ledger CFO account.</p>

    <div class="error-banner" id="errorBanner"></div>
    <div class="success-banner" id="successBanner">Password updated! Redirecting you to login...</div>

    <div class="form-group">
      <label class="form-label">New password</label>
      <input class="form-input" type="password" id="newPassword" placeholder="Min. 8 characters"/>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm password</label>
      <input class="form-input" type="password" id="confirmPassword" placeholder="Repeat new password"/>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleReset()">Set New Password →</button>
  </div>
</div>

<footer>© 2026 Ledger CFO · <a href="terms.html" style="color:var(--gray-light)">Terms</a> · <a href="privacy.html" style="color:var(--gray-light)">Privacy</a></footer>

<script>
const API='https://ledger-cfo-backend-production.up.railway.app';

// Get token from URL hash (Supabase puts it there)
const hashParams=new URLSearchParams(window.location.hash.replace('#',''));
const accessToken=hashParams.get('access_token');

if(!accessToken){
  document.getElementById('errorBanner').textContent='Invalid or expired reset link. Please request a new one.';
  document.getElementById('errorBanner').classList.add('show');
  document.getElementById('submitBtn').disabled=true;
}

async function handleReset(){
  const newPass=document.getElementById('newPassword').value;
  const confirmPass=document.getElementById('confirmPassword').value;
  const errorBanner=document.getElementById('errorBanner');
  const successBanner=document.getElementById('successBanner');
  errorBanner.classList.remove('show');

  if(newPass.length < 8){errorBanner.textContent='Password must be at least 8 characters';errorBanner.classList.add('show');return;}
  if(newPass !== confirmPass){errorBanner.textContent='Passwords do not match';errorBanner.classList.add('show');return;}

  const btn=document.getElementById('submitBtn');
  btn.textContent='Updating...';btn.disabled=true;

  try{
    const res=await fetch(`${API}/api/auth/update-password`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},
      body:JSON.stringify({password:newPass})
    });
    if(res.ok){
      successBanner.classList.add('show');
      setTimeout(()=>window.location.href='login.html',2000);
    } else {
      const d=await res.json();
      errorBanner.textContent=d.error||'Could not update password. Please try again.';
      errorBanner.classList.add('show');
      btn.textContent='Set New Password →';btn.disabled=false;
    }
  }catch(e){
    errorBanner.textContent='Something went wrong. Please try again.';
    errorBanner.classList.add('show');
    btn.textContent='Set New Password →';btn.disabled=false;
  }
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')handleReset();});
</script>
</body>
</html>
